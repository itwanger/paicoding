spring:
  datasource:
    url: jdbc:mysql://${PAICODING_DB_HOST:localhost}:${PAICODING_DB_PORT:3306}/${database.name}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${PAICODING_DB_USERNAME:root}
    password: ${PAICODING_DB_PASSWORD:}
  redis:
    host: ${PAICODING_REDIS_HOST:localhost}
    port: ${PAICODING_REDIS_PORT:6379}
    password: ${PAICODING_REDIS_PASSWORD:}

# elasticsearch配置
elasticsearch:
  # 是否开启ES？本地启动如果没有安装ES，可以设置为false关闭ES
  open: ${PAICODING_ES_OPEN:false}
  # 文章全文搜索索引，避免和其他项目共用索引名
  article-index: paicoding_article_v1
  # es集群名称
  clusterName: elasticsearch
  hosts: ${PAICODING_ES_HOSTS:127.0.0.1:9200}
  userName: ${PAICODING_ES_USERNAME:}
  password: ${PAICODING_ES_PASSWORD:}
  # es 请求方式
  scheme: ${PAICODING_ES_SCHEME:http}
  # 连接 Elasticsearch 8.x 时开启 7.x REST API 兼容模式
  apiCompatibilityMode: ${PAICODING_ES_API_COMPATIBILITY_MODE:true}
  # 本地 https 自签名证书调试开关，生产环境不要打开
  insecureTrustAllCertificates: ${PAICODING_ES_INSECURE_TRUST_ALL_CERTIFICATES:false}
  # es 连接超时时间
  connectTimeOut: 1000
  # es socket 连接超时时间
  socketTimeOut: 30000
  # es 请求超时时间
  connectionRequestTimeOut: 500
  # es 最大连接数
  maxConnectNum: 100
  # es 每个路由的最大连接数
  maxConnectNumPerRoute: 100

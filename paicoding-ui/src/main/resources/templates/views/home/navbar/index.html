<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <div th:fragment="navbar(list)" class="home-nav-classify">
    <div class="card-body d-flex category-wrap type-box">
      <div class="d-flex align-content-start w-full category-list">
        <a th:each="category : ${list}"
                th:text="${category.category}"
                th:href="${category.category == '全部' ? '/' : '/article/category/' + category.category}"
                th:class="'category--item pt-2 pr-5 ' + ${(category.selected ? 'category--active' : '')}">
          全部
        </a>
      </div>
      <div class="d-flex justify-center invisible hidden w-0 category-search-input">
        <div class="relative w-full lg:max-w-lg">
          <form class="relative d-flex bg-transparent text-white lg:text-primary-900 m-0 z-50 home-search-form"
                action="/search"
                method="get">
            <input class="search-input lg:bg-transparent border-search border-gray-400 focus:border-primary-400 px-2.5 py-1.5 lg:py-1 m-1 w-full text-sm focus:outline-none "
                   type="text"
                   name="key"
                   placeholder="搜你想搜..."
                   aria-label="搜你想搜" maxlength="100" value="">
            <button type="submit" class="home-search-submit px-3 my-1 ml-1">搜索</button>
          </form>
          <div class="hidden search-result-block">
            <div class="ais-Hits Hits search-has-result">
              <ul class="ais-Hits-list"></ul>
            </div>
            <div class="HitCount search-no-result text-center px-4 border-b border-gray-500 text-white hidden">
              <p class="mb-0">嗯... 没有找到你想要的内容，换个关键字试试吧:
                <em>
                  <mark class="bg-transparent font-bold text-primary-300"></mark>
                </em>
              </p>
              <span class="inline-block font-medium mb-2" aria-hidden="true">¯\_(ツ)_/¯</span>
            </div>
          </div>
        </div>
        <div class="px-3 pt-2">
          <button type="button" class="right-8 px-1 ml-1 category-cancel-btn">
            <svg aria-hidden="true" focusable="false" data-prefix="far" data-icon="times"
                 class="svg-inline--fa fa-times fa-w-14 fa-lg" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 512">
              <path fill="currentColor" d="M207.6 256l107.72-107.72c6.23-6.23 6.23-16.34 0-22.58l-25.03-25.03c-6.23-6.23-16.34-6.23-22.58 0L160 208.4 52.28 100.68c-6.23-6.23-16.34-6.23-22.58 0L4.68 125.7c-6.23 6.23-6.23 16.34 0 22.58L112.4 256 4.68 363.72c-6.23 6.23-6.23 16.34 0 22.58l25.03 25.03c6.23 6.23 16.34 6.23 22.58 0L160 303.6l107.72 107.72c6.23 6.23 16.34 6.23 22.58 0l25.03-25.03c6.23-6.23 6.23-16.34 0-22.58L207.6 256z"></path>
            </svg>
          </button>
        </div>
      </div>
      <button type="button" class="right-8 px-3 ml-4 category-search-btn">
        <svg aria-hidden="true" focusable="false" data-prefix="fas" data-icon="search"
             class="svg-inline--fa fa-search fa-w-16 "
             role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <path fill="currentColor" d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z"></path>
        </svg>
      </button>

      <script  th:inline="javascript">
        var searchBtn = $(".category-search-btn"), categoryList = $(".category-list"),
                categorySearchInput = $(".category-search-input"),
                cancelBtn = $(".category-cancel-btn"),
                searchInput = $(".search-input"),
                searchForm = $(".home-search-form"),
                searchSubmitBtn = $(".home-search-submit"),
                searchResultBlock = $(".search-result-block"),
                searchHasResultUl = $(".search-has-result ul", searchResultBlock),
                searchNoResult = $(".search-no-result", searchResultBlock);

        function escapeHtml(value) {
          return $("<div>").text(value || "").html();
        }

        function highlightTitle(title, keyword) {
          title = title || "";
          var index = title.indexOf(keyword);
          if (index < 0) {
            return escapeHtml(title);
          }
          return escapeHtml(title.substring(0, index))
                  + '<mark class="text-primary-300 bg-transparent">' + escapeHtml(keyword) + '</mark>'
                  + escapeHtml(title.substring(index + keyword.length));
        }

        function hideSearchResult() {
          searchResultBlock.addClass("hidden");
          searchHasResultUl.empty();
          searchNoResult.addClass("hidden");
        }

        function renderSearchResult(text, items) {
          searchResultBlock.removeClass("hidden");
          searchNoResult.addClass("hidden");
          searchHasResultUl.empty();

          if (!items || items.length === 0) {
            $(".search-no-result mark", searchResultBlock).text(text);
            searchNoResult.removeClass("hidden");
            return;
          }

          $.each(items, function(index, item) {
            searchHasResultUl.append(
                    '<li class="ais-Hits-item">'
                    + '<a class="my-0 border-b py-1 px-2 border-gray-400 hover:bg-gray-400 block" href="/article/detail/' + encodeURIComponent(item.id) + '">'
                    + '<span class="text-white text-sm hover:text-primary-200">' + highlightTitle(item.title, text) + '</span>'
                    + '</a>'
                    + '</li>'
            );
          });
        }

        function searchByKeyword(text) {
          searchSubmitBtn.prop("disabled", true).text("搜索中");
          $.ajax({
            url: "/search/api/hint",
            data: {key: text},
            dataType: "json",
            type: "GET",
            success: function(data) {
              if (!data || !data.status || data.status.code !== 0) {
                toastr.error(data && data.status ? data.status.msg : "搜索出错啦");
                return;
              }
              renderSearchResult(text, data.result ? data.result.items : []);
            },
            error: function() {
              toastr.error("搜索出错啦");
            },
            complete: function() {
              searchSubmitBtn.prop("disabled", false).text("搜索");
            }
          });
        }

        searchBtn.click(() => {
          searchBtn.addClass("hidden");
          categoryList.removeClass("w-full").addClass("hidden invisible w-0");
          categorySearchInput.removeClass("hidden invisible w-0").addClass("w-full");
          setTimeout(function () {
            searchInput.focus();
          }, 20);
        });
        cancelBtn.click(() => {
          searchBtn.removeClass("hidden");
          categoryList.removeClass("hidden invisible w-0").addClass("w-full");
          categorySearchInput.removeClass("w-full").addClass("hidden invisible w-0");
          hideSearchResult();
        });

        searchForm.on('submit', function(event) {
          event.preventDefault();
          var text = $.trim(searchInput.val());
          if (!text) {
            hideSearchResult();
            searchInput.focus();
            return;
          }
          searchInput.val(text);
          searchByKeyword(text);
        });
      </script>
    </div>
  </div>


</html>

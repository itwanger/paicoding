<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
  <!-- 评论列表 -->
  <div
    th:fragment="comment_list(hotComment, comments, article, topCommentTotal)"
    class="comment-list-wrap bg-color-white"
    id="commentList">
    <div>
      <svg xmlns="http://www.w3.org/2000/svg" style="display:none;" class="">
        <symbol id="icon-comment" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd"
                d="M4.62739 1.25C2.9347 1.25 1.5625 2.6222 1.5625 4.31489L1.56396 12.643C1.56403 14.3356 2.9362 15.7078 4.62885 15.7078H6.48326L6.93691 17.6869L6.93884 17.6948C7.16894 18.6441 8.28598 19.0599 9.08073 18.4921L12.7965 15.7078H15.5001C17.1928 15.7078 18.565 14.3355 18.565 12.6428L18.5635 4.31477C18.5635 2.62213 17.1913 1.25 15.4986 1.25H4.62739ZM5.98265 9.89255C6.68783 9.89255 7.2595 9.32089 7.2595 8.61571C7.2595 7.91053 6.68783 7.33887 5.98265 7.33887C5.27747 7.33887 4.70581 7.91053 4.70581 8.61571C4.70581 9.32089 5.27747 9.89255 5.98265 9.89255ZM9.95604 9.89255C10.6612 9.89255 11.2329 9.32089 11.2329 8.61571C11.2329 7.91053 10.6612 7.33887 9.95604 7.33887C9.25086 7.33887 8.6792 7.91053 8.6792 8.61571C8.6792 9.32089 9.25086 9.89255 9.95604 9.89255ZM15.2124 8.61571C15.2124 9.32089 14.6407 9.89255 13.9355 9.89255C13.2304 9.89255 12.6587 9.32089 12.6587 8.61571C12.6587 7.91053 13.2304 7.33887 13.9355 7.33887C14.6407 7.33887 15.2124 7.91053 15.2124 8.61571Z"
          ></path>
        </symbol>
        <symbol id="icon-zan" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd"

          ></path>
        </symbol>
      </svg>
    </div>

    <style>

      .comment-load-trigger,
      .expand-replies-btn,
      .load-more-sub-comments a,
      .load-more-top-comments-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        min-height: 42px;
        padding: 0 18px;
        border: 1px solid #ffd8bf;
        border-radius: 999px;
        background: #fff5ec;
        color: #ff6b35;
        font-size: 14px;
        font-weight: 500;
        line-height: 1;
        text-decoration: none;
        white-space: nowrap;
        transition: all 0.2s ease;
      }

      .comment-load-trigger:hover,
      .expand-replies-btn:hover,
      .load-more-sub-comments a:hover,
      .load-more-top-comments-btn:hover {
        background: #ffefe2;
        border-color: #ffbe94;
        color: #ff6b35;
        text-decoration: none;
      }

      .comment-load-icon,
      .expand-replies-btn .expand-icon {
        flex: 0 0 auto;
        transition: transform 0.2s ease;
      }

      .expand-replies-btn.expanded .expand-icon {
        transform: rotate(-90deg);
      }

      .sub-comments-container {
        margin-top: 12px;
        border-left: 2px solid #f2f3f5;
      }

      .sub-comment-item-highlight {
        background: #fff8e8;
        border-radius: 12px;
        transition: background 1.2s ease;
      }

      .load-more-sub-comments {
        display: flex;
        justify-content: flex-start;
        padding: 12px 0 0 0;
      }

      .load-more-top-comments {
        display: flex;
        padding-left: 20px;
        justify-content: flex-start;
      }
    </style>
    <div class="comment-write-wrap">
      <img
        th:if="${global.isLogin}"
        th:alt="${global.user.userName}"
        th:src="${global.user.photo}"
        class="comment-write-img"
      />
      <!-- <div th:if="${!global.isLogin}"></div> -->
      <div class="common-write-content">
        <div class="comment-input-container">
        <textarea th:data-target="${global.isLogin ? '' : '#loginModal'}"
                  th:data-toggle="${global.isLogin ? '' : 'modal'}"
                  th:placeholder="${global.isLogin ? '讨论应以学习和精进为目的。请勿发布不友善或者负能量的内容，与人为善，比聪明更重要！' : '请先登录后再评论'}"
                  class="comment-write-textarea" id="commentContent" maxlength="512"></textarea>
          <div class="comment-toolbar">
            <div class="toolbar-left">
              <div class="ai-bot-selector" id="aiBotSelector">
                <button type="button" class="ai-bot-btn" id="aiBotBtn">
                  🤖
                </button>
                <div class="ai-bot-dropdown" id="aiBotDropdown">
                  <div class="ai-bot-option" data-bot="hater">杠精派</div>
                  <div class="ai-bot-option" data-bot="smart">派聪明</div>
                </div>
              </div>
            </div>
            <div class="toolbar-right">
              <span class="comment-count"><span id="commentCount">0</span>/512</span>
              <button id="commentBtn" type="button" class="comment-write-btn c-btn c-btn-disabled" disabled>
                评论
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 评论列表 -->
    <div th:class="${(#lists.isEmpty(comments) ? ' no-comment-box' : '')}">
      <!-- 热门评论  -->
      <div th:if="${hotComment != null}" class="comment-list-wrap hot-comment bg-color-white">
        <h4 class="hot-comment-title">
          热门评论
          <img src="https://cdn.cnbj1.fds.api.mi-img.com/aife/technology-platform-fe/preview/dist/static/hotImg.899405d3.png" _
               nk="FpHZ31"
               width="30"
               height="30"
               viewBox="0 0 1024 1024">
            <path d="M336 972.8c-60.8-128-28.8-201.6 19.2-268.8 51.2-76.8 64-150.4 64-150.4s41.6 51.2 25.6 134.4c70.4-80 83.2-208 73.6-256 160 112 230.4 358.4 137.6 537.6 492.8-281.6 121.6-700.8 57.6-745.6 22.4 48 25.6 128-19.2 166.4-73.6-281.6-256-336-256-336 22.4 144-76.8 300.8-172.8 419.2-3.2-57.6-6.4-96-38.4-153.6-6.4 105.6-86.4 188.8-108.8 294.4C89.6 758.4 140.8 860.8 336 972.8L336 972.8z"
              p-id="2618"
              fill="#d81e06"></path>
          </svg>
        </h4>

        <div
          th:replace="components/comment/comment-item :: comment_item(${hotComment}, 'hot')"
        ></div>
        <hr />
      </div>

      <!-- 全部评论列表 -->
      <div class="all-comment bg-color-white" th:if="${!#lists.isEmpty(comments)}">
        <h4 class="all-comment-title">
          <em th:text="${article != null && article.count != null ? article.count.commentCount : #lists.size(comments)}"></em>
          条评论
        </h4>
        <div class="all-comment-items">
          <div class="all-comment-item" th:each="comment : ${comments}">
            <div th:replace="components/comment/comment-item :: comment_item(${comment}, 'bottom')"></div>
          </div>
        </div>
        <div class="load-more-top-comments" th:if="${topCommentTotal != null && topCommentTotal > #lists.size(comments)}">
          <button type="button"
                  class="comment-load-trigger load-more-top-comments-btn"
                  th:attr="data-article-id=${article.articleId},data-page-num=2,data-page-size=10"
                  onclick="loadMoreTopComments(this)">
            <svg class="comment-load-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            展开更多评论
          </button>
        </div>
      </div>
    </div>

    <!-- 二级评论 Modal -->
    <div
      class="modal fade"
      id="commentModal"
      data-backdrop="static"
      data-keyboard="false"
      tabindex="-1"
      role="dialog"
      aria-labelledby="commentModalDropLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="commentModalDropLabel">回复</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close"
            >
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <p id="repliedContent" class="comment-content-box-content"></p>
            <div class="input-group">
              <textarea
                id="replyContent"
                placeholder="请输入回复内容"
                class="posts-comment-input-box-textarea"
              ></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button
              id="replyBtn"
              data-reply-id=""
              type="button"
              class="btn btn-primary"
            >
              回复
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
            >
              取消
            </button>
          </div>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      var commentListIsLogin = /*[[${global.isLogin}]]*/ false;

      function loadSubComments(topCommentId, pageNum, callback) {
        $.ajax({
          url: '/comment/api/subComments',
          type: 'GET',
          data: {
            topCommentId: topCommentId,
            pageNum: pageNum,
            pageSize: 10
          },
          success: function(res) {
            if (res.status && res.status.code === 0) {
              callback(res.result);
            } else {
              callback(null);
            }
          },
          error: function() {
            callback(null);
          }
        });
      }

      function loadTopCommentPage(articleId, pageNum, pageSize, callback) {
        $.ajax({
          url: '/comment/api/listPageHtml',
          type: 'GET',
          data: {
            articleId: articleId,
            pageNum: pageNum,
            pageSize: pageSize
          },
          success: function(res) {
            if (res.status && res.status.code === 0) {
              callback(res.result);
            } else {
              callback(null);
            }
          },
          error: function() {
            callback(null);
          }
        });
      }

      function buildSubCommentHtml(reply, topCommentId, isHighlightThread) {
        var authorTag = reply.author ? '（作者）' : '';
        var loginAttrs = commentListIsLogin ? '' : ' data-target="#loginModal" data-toggle="modal"';
        var replyLabel = String(reply.parentCommentId) === String(topCommentId) ? '回复主评论' : '回复上一条评论';
        var parentHtml = reply.parentContent ? '<div class="comment-reply-context"><div class="comment-reply-path">' + replyLabel + '</div><div class="comment-parent-preview">' + escapeHtml(reply.parentContent) + '</div></div>' : '';
        var headerClass = isHighlightThread ? 'sub-comment-header comment-item-meta' : 'sub-comment-header';
        return '<div class="comment-item-wrap-second sub-comment-item" data-comment-id="' + reply.commentId + '">' +
                '<div class="comment-item-top">' +
                '<div class="common-item-content sub-comment-content">' +
                '<div class="' + headerClass + '">' +
                '<a href="/user/' + reply.userId + '" target="_blank">' +
                '<img src="' + reply.userPhoto + '" class="comment-item-img" />' +
                '</a>' +
                '<div class="common-item-content-head">' +
                '<span><a href="/user/' + reply.userId + '" target="_blank" class="comment-name">' + escapeHtml(reply.userName) + authorTag + '</a></span>' +
                '<span class="comment-time">' + reply.commentTimeStr + '</span>' +
                '</div>' +
                '</div>' +
                '<div class="sub-comment-body">' +
                '<div class="common-item-content-value comment-content-markdown" data-comment-id="' + reply.commentId + '">' + escapeHtml(reply.commentContent) + '</div>' +
                parentHtml +
                '<div class="action-box">' +
                '<div class="item dig-item"' + loginAttrs +
                ' data-comment-id="' + reply.commentId + '"' +
                ' data-praise-count="' + reply.praiseCount + '"' +
                ' data-praised="' + !!reply.praised + '"' +
                ' onclick="praiseComment(this, ' + commentListIsLogin + ')">' +
                '<svg width="16" height="16"><use xlink:href="#icon-zan"></use></svg>' +
                '<span>' + (reply.praiseCount > 0 ? reply.praiseCount : '点赞') + '</span>' +
                '</div>' +
                '<div class="item reply-comment hf-con-block"' + loginAttrs +
                ' data-reply-top="' + topCommentId + '"' +
                ' data-reply-id="' + reply.commentId + '"' +
                ' data-reply-nickname="' + escapeHtml(reply.userName) + '"' +
                ' data-reply-content="' + escapeHtml(reply.commentContent) + '">' +
                '<svg width="16" height="16"><use xlink:href="#icon-comment"></use></svg>' +
                '<span class="reply-comment-text">回复</span>' +
                '<span class="reply-comment-text-none">取消回复</span>' +
                '</div>' +
                '</div>' +
                '</div>' +
                '</div>' +
                '</div>';
      }

      function escapeHtml(text) {
        if (!text) {
          return '';
        }
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function renderSubComments(subComments, container, topCommentId) {
        var isHighlightThread = container.closest('.highlight-comment-thread').length > 0;
        subComments.forEach(function(reply) {
          if (container.find('.sub-comment-item[data-comment-id="' + reply.commentId + '"]').length === 0) {
            container.append(buildSubCommentHtml(reply, topCommentId, isHighlightThread));
          }
        });
      }

      function bindDynamicReplyInput(input) {
        input.off('input.dynamicReply propertychange.dynamicReply')
                .on('input.dynamicReply propertychange.dynamicReply', function() {
                  var submitBtn = $(this).siblings('.hf-pl');
                  if ($(this).val()) {
                    submitBtn.attr('disabled', false).removeClass('hf-pl--disabled');
                  } else {
                    submitBtn.attr('disabled', true).addClass('hf-pl--disabled');
                  }
                });
      }

      window.submitDynamicReply = function(btn) {
        var currentDom = $(btn);
        var replyContent = currentDom.siblings('.hf-input');
        var replyBtn = currentDom.closest('.common-item-content').find('.reply-comment').first();
        var targetTopCommentId = replyBtn.attr('data-reply-top');
        var currentWrap = currentDom.closest('.expand-replies-wrap');

        if (!replyContent.val()) {
          toastr.error('回复内容不能为空');
          return;
        }

        currentDom.attr('disabled', true).addClass('hf-pl--disabled');
        var params = {
          articleId: $('#postsTitle').attr('data-id'),
          commentContent: replyContent.val(),
          parentCommentId: replyBtn.attr('data-reply-id'),
          topCommentId: replyBtn.attr('data-reply-top')
        };

        $.ajax({
          method: 'POST',
          url: '/comment/api/post',
          contentType: 'application/json',
          data: JSON.stringify(params),
          success: function(data) {
            if (!data || !data.status || data.status.code !== 0) {
              currentDom.attr('disabled', false).removeClass('hf-pl--disabled');
              toastr.error(data && data.status ? data.status.msg : '评论失败');
              return;
            }
            toastr.success('评论成功');
            currentDom.closest('.hf-con').remove();
            replyBtn.addClass('hf-con-block');
            replyBtn.find('.reply-comment-text').show();
            replyBtn.find('.reply-comment-text-none').hide();
            if (currentWrap.length && targetTopCommentId) {
              refreshExpandedSubComments(currentWrap, targetTopCommentId, function(success) {
                if (success) {
                  highlightLatestSubComment(currentWrap);
                }
              });
            }
          },
          error: function() {
            currentDom.attr('disabled', false).removeClass('hf-pl--disabled');
            toastr.error('出现bug了，热心反馈下吧!');
          }
        });
      }

      window.toggleDynamicReply = function(btn) {
        var currentDom = $(btn);
        $('.hf-con').remove();
        $('.reply-comment').each(function() {
          $(this).addClass('hf-con-block');
          $(this).find('.reply-comment-text').show();
          $(this).find('.reply-comment-text-none').hide();
        });

        var fhName = currentDom.attr('data-reply-nickname') ||
                currentDom.closest('.common-item-content').find('.comment-name').first().text();
        fhName = fhName ? fhName.trim() : '';
        var fhHtml = '<div class="hf-con pull-left"><textarea class="hf-input" placeholder=""></textarea><button type="button" disabled class="hf-pl hf-pl--disabled" onclick="submitDynamicReply(this)">评论</button></div>';

        if (currentDom.is('.hf-con-block')) {
          currentDom.closest('.common-item-content').append(fhHtml);
          currentDom.removeClass('hf-con-block');
          var replyInput = currentDom.closest('.common-item-content')
                  .find('.hf-input')
                  .last();
          replyInput
                  .val('')
                  .focus()
                  .attr('placeholder', '回复@' + fhName + '：');
          bindDynamicReplyInput(replyInput);
          currentDom.find('.reply-comment-text').hide();
          currentDom.find('.reply-comment-text-none').show();
          return;
        }

        currentDom.addClass('hf-con-block');
        currentDom.closest('.common-item-content').find('.pull-left').remove();
        currentDom.find('.reply-comment-text').show();
        currentDom.find('.reply-comment-text-none').hide();
      }

      function showLoadMoreButton(wrap, hasMore) {
        wrap.data('has-more', hasMore);
        var btnWrap = wrap.find('.load-more-sub-comments').first();
        var loadMoreBtn = btnWrap.find('a').first();
        if (hasMore) {
          updateLoadMoreText(wrap);
          btnWrap.show();
        } else {
          if (loadMoreBtn.length) {
            loadMoreBtn.text('没有更多了');
          }
          btnWrap.hide();
        }
      }

      function setLoadMorePageNum(wrap, pageNum) {
        var nextPage = pageNum || 1;
        var loadMoreBtn = wrap.find('.load-more-sub-comments a').first();
        if (!loadMoreBtn.length) {
          return;
        }
        loadMoreBtn.attr('data-page-num', nextPage);
        loadMoreBtn.data('page-num', nextPage);
      }

      function getPreloadedCount(wrap) {
        return wrap.find('.sub-comments-container .sub-comment-item[data-preloaded="true"]').length;
      }

      function getLoadedCount(wrap) {
        return wrap.find('.sub-comments-container .sub-comment-item').length;
      }

      function getTotalCount(wrap) {
        return parseInt(wrap.data('comment-count'), 10) || 0;
      }

      function setCollapsedExpandText(wrap) {
        var expandText = wrap.find('.expand-text').first();
        if (!expandText.length) {
          return;
        }
        var remaining = Math.max(0, getTotalCount(wrap) - getPreloadedCount(wrap));
        expandText.text(remaining > 0 ? '展开剩余 ' + remaining + ' 条回复' : '展开回复');
      }

      function updateExpandText(wrap, expanded) {
        var expandBtn = wrap.find('.expand-replies-btn').first();
        var expandText = expandBtn.find('.expand-text');
        if (!expandText.length) {
          return;
        }

        if (!expanded) {
          setCollapsedExpandText(wrap);
          expandBtn.removeClass('expanded');
          return;
        }

        expandText.text('收起回复');
        expandBtn.addClass('expanded');
      }

      function setLoadMorePageNum(wrap, pageNum) {
        var nextPage = pageNum || 1;
        var loadMoreBtn = wrap.find('.load-more-sub-comments a').first();
        if (!loadMoreBtn.length) {
          return;
        }
        loadMoreBtn.attr('data-page-num', nextPage);
        loadMoreBtn.data('page-num', nextPage);
      }

      function updateLoadMoreText(wrap) {
        var loadMoreBtn = wrap.find('.load-more-sub-comments a').first();
        if (!loadMoreBtn.length) {
          return;
        }
        var remaining = Math.max(0, getTotalCount(wrap) - getLoadedCount(wrap));
        loadMoreBtn.text(remaining > 0 ? '展开剩余 ' + remaining + ' 条回复' : '没有更多了');
      }

      function setReplyToggleVisibility(wrap, totalCount) {
        var expandBtn = wrap.find('.expand-replies-btn').first();
        if (!expandBtn.length) {
          return;
        }

        if ((totalCount || 0) <= getPreloadedCount(wrap)) {
          expandBtn.hide();
          wrap.find('.load-more-sub-comments').hide();
          return;
        }

        expandBtn.show();
        updateExpandText(wrap, wrap.data('expanded') === true);
      }

      window.autoExpandSingleReplyWraps = function(scope) {
        var root = scope ? $(scope) : $(document);
        root.find('.expand-replies-wrap').each(function() {
          var wrap = $(this);
          var totalCount = getTotalCount(wrap);

          if (totalCount <= 0) {
            return;
          }

          setReplyToggleVisibility(wrap, totalCount);
        });
      }

      function highlightLatestSubComment(wrap) {
        var latestComment = wrap.find('.sub-comment-item').last();
        if (!latestComment.length) {
          return;
        }
        latestComment.addClass('sub-comment-item-highlight');
        latestComment[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(function() {
          latestComment.removeClass('sub-comment-item-highlight');
        }, 1800);
      }

      function updateTopCommentReplyText(wrap, totalCount) {
        var topReplyText = wrap.prev('.comment-item-wrap').find('.reply-comment-text').first();
        if (!topReplyText.length) {
          return;
        }
        topReplyText.text(totalCount > 0 ? '回复' + totalCount : '回复');
      }

      function refreshExpandedSubComments(wrap, topCommentId, callback) {
        var container = wrap.find('.sub-comments-container').first();
        var loadingIndicator = container.find('.loading-indicator');

        container.children('.sub-comment-item').remove();
        container.show();
        loadingIndicator.show();
        wrap.data('expanded', true);
        wrap.find('.load-more-sub-comments').hide();

        function loadAllPages(pageNum, totalCount) {
          loadSubComments(topCommentId, pageNum, function(result) {
            if (!result || !result.list) {
              loadingIndicator.hide();
              if (callback) {
                callback(false);
              }
              return;
            }

            var latestTotal = result.total || totalCount || 0;
            renderSubComments(result.list, container, topCommentId);
            container.children('.sub-comment-item').first().attr('data-preloaded', 'true');
            wrap.data('comment-count', latestTotal);
            updateTopCommentReplyText(wrap, latestTotal);
            setReplyToggleVisibility(wrap, latestTotal);
            updateExpandText(wrap, true);

            if (result.hasMore) {
              setLoadMorePageNum(wrap, pageNum + 1);
              loadAllPages(pageNum + 1, latestTotal);
              return;
            }

            loadingIndicator.hide();
            showLoadMoreButton(wrap, false);
            setReplyToggleVisibility(wrap, latestTotal);
            updateExpandText(wrap, true);
            if (callback) {
              callback(true);
            }
          });
        }

        loadAllPages(1, parseInt(wrap.data('comment-count'), 10) || 0);
      }

      function toggleSubComments(btn) {
        var $btn = $(btn);
        var wrap = $btn.closest('.expand-replies-wrap');
        var topCommentId = $btn.data('top-comment-id');
        var container = wrap.find('.sub-comments-container').first();
        var loadingIndicator = container.find('.loading-indicator');
        var totalCount = getTotalCount(wrap);
        var loadedCount = getLoadedCount(wrap);
        var preloadedCount = getPreloadedCount(wrap);
        var isExpanded = wrap.data('expanded') === true;

        if (isExpanded) {
          var extraItems = container.children('.sub-comment-item').not('[data-preloaded="true"]');
          if (extraItems.length > 0) {
            extraItems.remove();
          } else if (preloadedCount === 0) {
            container.slideUp();
          }
          wrap.find('.load-more-sub-comments').hide();
          wrap.data('expanded', false);
          updateExpandText(wrap, false);
          return;
        }

        if (loadedCount < totalCount) {
          loadingIndicator.show();
          wrap.data('expanded', true);
          updateExpandText(wrap, true);
          container.show();

          loadSubComments(topCommentId, Math.floor(loadedCount / 10) + 1, function(result) {
            loadingIndicator.hide();
            if (result && result.list && result.list.length > 0) {
              renderSubComments(result.list, container, topCommentId);
              wrap.data('comment-count', result.total || wrap.data('comment-count'));
              setReplyToggleVisibility(wrap, result.total || wrap.data('comment-count'));
              updateExpandText(wrap, true);
              setLoadMorePageNum(wrap, Math.floor(loadedCount / 10) + 2);
              showLoadMoreButton(wrap, result.hasMore);
            } else {
              showLoadMoreButton(wrap, false);
              updateExpandText(wrap, true);
            }
          });
          return;
        }

        wrap.data('expanded', true);
        container.slideDown();
        if (wrap.data('has-more')) {
          wrap.find('.load-more-sub-comments').show();
        }
        updateExpandText(wrap, true);
      }

      window.loadMoreSubComments = function(btn) {
        var $btn = $(btn);
        var wrap = $btn.closest('.expand-replies-wrap');
        var topCommentId = $btn.data('top-comment-id');
        var container = wrap.find('.sub-comments-container').first();
        var pageNum = parseInt($btn.attr('data-page-num'), 10) || 1;

        $btn.text('加载中...');

        loadSubComments(topCommentId, pageNum, function(result) {
          if (result && result.list && result.list.length > 0) {
            renderSubComments(result.list, container, topCommentId);
            wrap.data('comment-count', result.total || wrap.data('comment-count'));
            setReplyToggleVisibility(wrap, result.total || wrap.data('comment-count'));
            updateExpandText(wrap, true);
            setLoadMorePageNum(wrap, pageNum + 1);
            showLoadMoreButton(wrap, result.hasMore);
            if (!result.hasMore) {
              $btn.off('click');
            }
            return;
          }

          showLoadMoreButton(wrap, false);
          $btn.text('没有更多了').off('click');
        });
      }

      window.loadMoreTopComments = function(btn) {
        var $btn = $(btn);
        var articleId = $btn.data('article-id');
        var pageNum = $btn.data('page-num');
        var pageSize = $btn.data('page-size');

        $btn.prop('disabled', true).text('加载中...');

        loadTopCommentPage(articleId, pageNum, pageSize, function(result) {
          if (!result || !result.html) {
            $btn.closest('.load-more-top-comments').hide();
            return;
          }

          var tempWrap = $('<div></div>').html(result.html);
          $('#commentList .all-comment-items').append(tempWrap.children());
          window.autoExpandSingleReplyWraps($('#commentList .all-comment-items'));

          if (result.hasMore) {
            $btn.prop('disabled', false).text('展开更多评论');
            $btn.data('page-num', result.nextPageNum);
            return;
          }

          $btn.closest('.load-more-top-comments').hide();
        });
      }

      $(function() {
        window.autoExpandSingleReplyWraps(document);
      });
    </script>
  </div>
</html>
